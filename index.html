<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <meta name="color-scheme" content="dark light" />
  <title>HN Reader — Comments First</title>
  <style>
    :root {
      color-scheme: dark;
      --bg: #0d1117;
      --surface: #161b22;
      --surface-raised: #1c2129;
      --border: #30363d;
      --border-strong: #484f58;
      --accent: #ff7a1a;
      --accent-hover: #ff984d;
      --accent-soft: rgba(255, 122, 26, 0.12);
      --text: #c9d1d9;
      --text-muted: #8b949e;
      --heading: #f0f3f6;
      --focus: #58a6ff;
      --radius: 10px;
      --content-width: 780px;
    }

    :root[data-theme="light"] {
      color-scheme: light;
      --bg: #f6f8fa;
      --surface: #ffffff;
      --surface-raised: #f6f8fa;
      --border: #d0d7de;
      --border-strong: #8c959f;
      --accent: #c54b00;
      --accent-hover: #9d3c00;
      --accent-soft: rgba(197, 75, 0, 0.09);
      --text: #24292f;
      --text-muted: #57606a;
      --heading: #1f2328;
      --focus: #0969da;
    }

    *, *::before, *::after { box-sizing: border-box; }

    html { scrollbar-gutter: stable; }

    body {
      margin: 0;
      min-height: 100vh;
      background: var(--bg);
      color: var(--text);
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Helvetica, Arial, sans-serif;
      font-size: 15px;
      line-height: 1.5;
    }

    button, select, input { font: inherit; }

    a:focus-visible, button:focus-visible, select:focus-visible, input:focus-visible {
      outline: 3px solid var(--focus);
      outline-offset: 2px;
    }

    .site-header {
      border-bottom: 1px solid var(--border);
      background: var(--surface);
    }

    .header-inner, .filter-inner, .status-bar, main {
      width: min(calc(100% - 32px), var(--content-width));
      margin-inline: auto;
    }

    .header-inner {
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 16px;
      padding-block: 22px;
    }

    h1 {
      margin: 0;
      color: var(--heading);
      font-size: clamp(1.35rem, 4vw, 1.65rem);
      line-height: 1.15;
      letter-spacing: -0.03em;
    }

    .brand-mark { color: var(--accent); }

    .tagline {
      margin: 4px 0 0;
      color: var(--text-muted);
      font-size: 0.85rem;
    }

    .theme-toggle {
      min-width: 42px;
      min-height: 42px;
      padding: 7px 10px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface-raised);
      color: var(--text);
      cursor: pointer;
    }

    .theme-toggle:hover { border-color: var(--border-strong); }

    .filter-shell {
      position: sticky;
      z-index: 10;
      top: 0;
      border-bottom: 1px solid var(--border);
      background: color-mix(in srgb, var(--surface) 94%, transparent);
      backdrop-filter: blur(10px);
    }

    .filter-inner {
      display: grid;
      grid-template-columns: 1fr 1fr 1.15fr auto;
      align-items: end;
      gap: 10px;
      padding-block: 12px;
    }

    .control-group {
      display: flex;
      min-width: 0;
      flex-direction: column;
      gap: 4px;
    }

    .control-group label {
      color: var(--text-muted);
      font-size: 0.7rem;
      font-weight: 600;
      letter-spacing: 0.05em;
      text-transform: uppercase;
    }

    select, input[type="number"] {
      width: 100%;
      min-height: 40px;
      padding: 7px 9px;
      border: 1px solid var(--border);
      border-radius: 8px;
      background: var(--bg);
      color: var(--text);
    }

    select:hover, input[type="number"]:hover { border-color: var(--border-strong); }

    .apply-button, .load-more, .retry-button {
      min-height: 40px;
      padding: 8px 16px;
      border: 1px solid var(--accent);
      border-radius: 8px;
      background: var(--accent);
      color: #111;
      font-weight: 700;
      cursor: pointer;
    }

    .apply-button:hover, .load-more:hover, .retry-button:hover {
      border-color: var(--accent-hover);
      background: var(--accent-hover);
    }

    .apply-button:disabled { cursor: wait; opacity: 0.65; }

    .status-bar {
      min-height: 42px;
      padding-block: 10px 2px;
      color: var(--text-muted);
      font-size: 0.82rem;
    }

    .status-content {
      display: flex;
      align-items: center;
      gap: 8px;
    }

    .spinner {
      width: 14px;
      height: 14px;
      flex: 0 0 auto;
      border: 2px solid var(--border);
      border-top-color: var(--accent);
      border-radius: 50%;
      animation: spin 0.7s linear infinite;
    }

    @keyframes spin { to { transform: rotate(360deg); } }

    main {
      display: grid;
      gap: 12px;
      padding-block: 12px 28px;
    }

    .story-card {
      padding: 17px 18px;
      border: 1px solid var(--border);
      border-radius: var(--radius);
      background: var(--surface);
      transition: border-color 0.15s, transform 0.15s;
    }

    .story-card:hover {
      border-color: var(--border-strong);
      transform: translateY(-1px);
    }

    .story-card.read .story-title,
    .story-card.read .story-context,
    .story-card.read .story-points { opacity: 0.55; }

    .story-context {
      display: flex;
      flex-wrap: wrap;
      align-items: center;
      gap: 4px;
      margin-bottom: 7px;
      color: var(--text-muted);
      font-size: 0.75rem;
    }

    .story-context a {
      color: inherit;
      text-decoration: none;
    }

    .story-context a:hover { color: var(--accent); text-decoration: underline; }

    .read-label {
      display: none;
      padding: 0 5px;
      border: 1px solid var(--border);
      border-radius: 999px;
      font-size: 0.65rem;
      text-transform: uppercase;
    }

    .story-card.read .read-label { display: inline-block; }

    .story-title-row {
      display: grid;
      grid-template-columns: minmax(0, 1fr) auto;
      align-items: start;
      gap: 16px;
    }

    .story-title {
      color: var(--heading);
      font-size: 1.05rem;
      font-weight: 650;
      line-height: 1.38;
      text-decoration: none;
    }

    .story-title:hover { color: var(--accent); }

    .comment-count {
      color: var(--accent);
      font-size: 0.86rem;
      font-weight: 700;
      line-height: 1.4;
      white-space: nowrap;
    }

    .story-points {
      margin-top: 7px;
      color: var(--text-muted);
      font-size: 0.77rem;
    }

    .action-bar {
      display: flex;
      align-items: center;
      gap: 8px;
      margin-top: 13px;
    }

    .story-action {
      display: inline-flex;
      min-height: 38px;
      align-items: center;
      justify-content: center;
      padding: 7px 12px;
      border-radius: 8px;
      font-size: 0.82rem;
      font-weight: 650;
      text-decoration: none;
    }

    .discuss-action {
      border: 1px solid var(--accent);
      background: var(--accent-soft);
      color: var(--accent);
    }

    .discuss-action:hover { background: color-mix(in srgb, var(--accent) 20%, transparent); }

    .article-action {
      border: 1px solid var(--border);
      color: var(--text);
    }

    .article-action:hover { border-color: var(--border-strong); }

    .read-toggle {
      min-height: 38px;
      margin-left: auto;
      padding: 6px 2px;
      border: 0;
      background: transparent;
      color: var(--text-muted);
      font-size: 0.75rem;
      cursor: pointer;
    }

    .read-toggle:hover { color: var(--text); text-decoration: underline; }

    .empty-state, .error-state {
      padding: 64px 20px;
      text-align: center;
      color: var(--text-muted);
    }

    .empty-state h2, .error-state h2 {
      margin: 0 0 6px;
      color: var(--heading);
      font-size: 1.05rem;
    }

    .empty-state p, .error-state p { margin: 0 0 16px; }

    .skeleton {
      min-height: 154px;
      overflow: hidden;
      position: relative;
    }

    .skeleton::after {
      position: absolute;
      inset: 0;
      background: linear-gradient(90deg, transparent, rgba(139, 148, 158, 0.08), transparent);
      content: "";
      animation: shimmer 1.4s infinite;
      transform: translateX(-100%);
    }

    .skeleton-line {
      height: 11px;
      margin-bottom: 12px;
      border-radius: 20px;
      background: var(--surface-raised);
    }

    .skeleton-line.title { width: 80%; height: 18px; }
    .skeleton-line.short { width: 38%; }

    @keyframes shimmer { to { transform: translateX(100%); } }

    .load-more {
      width: 100%;
      margin-top: 4px;
      background: transparent;
      color: var(--accent);
    }

    footer {
      padding: 0 16px 28px;
      color: var(--text-muted);
      font-size: 0.75rem;
      text-align: center;
    }

    footer a { color: var(--text-muted); }
    footer a:hover { color: var(--accent); }

    @media (max-width: 680px) {
      .header-inner, .filter-inner, .status-bar, main {
        width: min(calc(100% - 24px), var(--content-width));
      }

      .filter-inner { grid-template-columns: 1fr 1fr; }
      .apply-button { width: 100%; }
      .story-title-row { display: block; }
      .comment-count { display: inline-block; margin-top: 8px; }
    }

    @media (max-width: 440px) {
      .filter-inner { grid-template-columns: 1fr; }
      .story-card { padding: 15px; }
      .action-bar { flex-wrap: wrap; }
      .story-action { flex: 1; }
      .read-toggle { width: 100%; margin-left: 0; }
    }

    @media (prefers-reduced-motion: reduce) {
      *, *::before, *::after {
        scroll-behavior: auto !important;
        transition-duration: 0.01ms !important;
        animation-duration: 0.01ms !important;
        animation-iteration-count: 1 !important;
      }
    }
  </style>
</head>
<body>
  <header class="site-header">
    <div class="header-inner">
      <div>
        <h1><span class="brand-mark" aria-hidden="true">▲</span> HN Reader</h1>
        <p class="tagline">The conversations worth catching</p>
      </div>
      <button class="theme-toggle" id="theme-toggle" type="button" aria-label="Use light theme" title="Change theme">☀</button>
    </div>
  </header>

  <div class="filter-shell">
    <form class="filter-inner" id="filter-form">
      <div class="control-group">
        <label for="timeframe">Timeframe</label>
        <select id="timeframe" name="timeframe">
          <option value="86400">24 hours</option>
          <option value="259200">3 days</option>
          <option value="604800">7 days</option>
          <option value="2592000">30 days</option>
        </select>
      </div>
      <div class="control-group">
        <label for="min-comments">Minimum comments</label>
        <input id="min-comments" name="minComments" type="number" value="100" min="0" max="10000" step="10" required />
      </div>
      <div class="control-group">
        <label for="sort-by">Sort by</label>
        <select id="sort-by" name="sort">
          <option value="comments">Most commented</option>
          <option value="points">Most points</option>
          <option value="recent">Most recent</option>
        </select>
      </div>
      <button class="apply-button" id="apply-button" type="submit">Apply</button>
    </form>
  </div>

  <div class="status-bar" id="status-bar" role="status" aria-live="polite"></div>
  <main id="story-list" aria-busy="true"></main>

  <footer>
    Data from <a href="https://hn.algolia.com/api" target="_blank" rel="noopener noreferrer">HN Algolia API</a>
    · Stories from <a href="https://news.ycombinator.com" target="_blank" rel="noopener noreferrer">Hacker News</a>
  </footer>

  <script>
    const READ_KEY = 'hn_read_stories';
    const FILTER_KEY = 'hn_reader_filters';
    const THEME_KEY = 'hn_reader_theme';
    const PAGE_SIZE = 25;
    const MAX_API_PAGES = 10;

    const state = {
      stories: [],
      visibleCount: PAGE_SIZE,
      isLoading: false,
      isTruncated: false
    };

    const elements = {
      form: document.getElementById('filter-form'),
      timeframe: document.getElementById('timeframe'),
      minComments: document.getElementById('min-comments'),
      sort: document.getElementById('sort-by'),
      apply: document.getElementById('apply-button'),
      status: document.getElementById('status-bar'),
      list: document.getElementById('story-list'),
      theme: document.getElementById('theme-toggle')
    };

    function getReadSet() {
      try {
        const stored = JSON.parse(localStorage.getItem(READ_KEY) || '[]');
        return new Set(Array.isArray(stored) ? stored.map(String) : []);
      } catch {
        return new Set();
      }
    }

    function setRead(id, isRead) {
      const readSet = getReadSet();
      if (isRead) readSet.add(String(id));
      else readSet.delete(String(id));
      localStorage.setItem(READ_KEY, JSON.stringify([...readSet]));

      const card = elements.list.querySelector(`[data-story-id="${CSS.escape(String(id))}"]`);
      if (!card) return;
      card.classList.toggle('read', isRead);
      const toggle = card.querySelector('.read-toggle');
      toggle.textContent = isRead ? 'Mark unread' : 'Mark read';
      toggle.setAttribute('aria-pressed', String(isRead));
    }

    function relativeTime(unixTimestamp) {
      const diff = Math.max(0, Math.floor(Date.now() / 1000) - Number(unixTimestamp || 0));
      if (diff < 60) return 'just now';
      if (diff < 3600) return `${Math.floor(diff / 60)}m ago`;
      if (diff < 86400) return `${Math.floor(diff / 3600)}h ago`;
      if (diff < 604800) return `${Math.floor(diff / 86400)}d ago`;
      return `${Math.floor(diff / 604800)}w ago`;
    }

    function safeArticleUrl(url) {
      if (!url) return null;
      try {
        const parsed = new URL(url);
        return ['http:', 'https:'].includes(parsed.protocol) ? parsed.href : null;
      } catch {
        return null;
      }
    }

    function extractDomain(url) {
      if (!url) return null;
      try {
        return new URL(url).hostname.replace(/^www\./, '');
      } catch {
        return null;
      }
    }

    function appendText(parent, text) {
      parent.append(document.createTextNode(text));
    }

    function setStatus(message, loading = false) {
      elements.status.replaceChildren();
      const content = document.createElement('div');
      content.className = 'status-content';
      if (loading) {
        const spinner = document.createElement('span');
        spinner.className = 'spinner';
        spinner.setAttribute('aria-hidden', 'true');
        content.append(spinner);
      }
      appendText(content, message);
      elements.status.append(content);
    }

    function renderSkeletons() {
      elements.list.replaceChildren();
      for (let index = 0; index < 4; index += 1) {
        const skeleton = document.createElement('div');
        skeleton.className = 'story-card skeleton';
        skeleton.setAttribute('aria-hidden', 'true');
        ['short', 'title', '', 'short'].forEach(kind => {
          const line = document.createElement('div');
          line.className = `skeleton-line ${kind}`.trim();
          skeleton.append(line);
        });
        elements.list.append(skeleton);
      }
    }

    function makeLink(className, label, href) {
      const link = document.createElement('a');
      link.className = className;
      link.textContent = label;
      link.href = href;
      link.target = '_blank';
      link.rel = 'noopener noreferrer';
      return link;
    }

    function createStoryCard(story) {
      const hnUrl = `https://news.ycombinator.com/item?id=${encodeURIComponent(story.objectID)}`;
      const articleUrl = safeArticleUrl(story.url);
      const titleUrl = articleUrl || hnUrl;
      const domain = extractDomain(articleUrl);
      const isRead = getReadSet().has(String(story.objectID));

      const article = document.createElement('article');
      article.className = `story-card${isRead ? ' read' : ''}`;
      article.dataset.storyId = String(story.objectID);

      const context = document.createElement('div');
      context.className = 'story-context';
      if (domain) {
        const source = makeLink('', domain, articleUrl);
        source.setAttribute('aria-label', `Read article on ${domain}`);
        context.append(source);
        appendText(context, ' · ');
      }
      appendText(context, `${relativeTime(story.created_at_i)} · by ${story.author || 'unknown'} · #${story.rank}`);
      const readLabel = document.createElement('span');
      readLabel.className = 'read-label';
      readLabel.textContent = 'Read';
      context.append(' ', readLabel);

      const titleRow = document.createElement('div');
      titleRow.className = 'story-title-row';
      const heading = document.createElement('h2');
      heading.style.margin = '0';
      heading.style.fontSize = 'inherit';
      const title = makeLink('story-title', story.title || '(untitled)', titleUrl);
      title.dataset.readTarget = String(story.objectID);
      heading.append(title);

      const comments = makeLink('comment-count', `${Number(story.num_comments || 0).toLocaleString()} comments`, hnUrl);
      comments.dataset.readTarget = String(story.objectID);
      titleRow.append(heading, comments);

      const points = document.createElement('div');
      points.className = 'story-points';
      points.textContent = `${Number(story.points || 0).toLocaleString()} points`;

      const actions = document.createElement('div');
      actions.className = 'action-bar';
      const discuss = makeLink('story-action discuss-action', 'Discuss on HN', hnUrl);
      discuss.dataset.readTarget = String(story.objectID);
      actions.append(discuss);

      if (articleUrl) {
        const readArticle = makeLink('story-action article-action', 'Read article ↗', articleUrl);
        readArticle.dataset.readTarget = String(story.objectID);
        actions.append(readArticle);
      }

      const readToggle = document.createElement('button');
      readToggle.className = 'read-toggle';
      readToggle.type = 'button';
      readToggle.textContent = isRead ? 'Mark unread' : 'Mark read';
      readToggle.setAttribute('aria-pressed', String(isRead));
      readToggle.addEventListener('click', () => {
        setRead(story.objectID, !article.classList.contains('read'));
      });
      actions.append(readToggle);

      article.append(context, titleRow, points, actions);
      return article;
    }

    function renderStories() {
      elements.list.replaceChildren();
      const visibleStories = state.stories.slice(0, state.visibleCount);

      if (!visibleStories.length) {
        const empty = document.createElement('section');
        empty.className = 'empty-state';
        const heading = document.createElement('h2');
        heading.textContent = 'No conversations found';
        const detail = document.createElement('p');
        detail.textContent = 'Try a longer timeframe or a lower comment minimum.';
        empty.append(heading, detail);
        elements.list.append(empty);
        return;
      }

      const fragment = document.createDocumentFragment();
      visibleStories.forEach(story => fragment.append(createStoryCard(story)));
      elements.list.append(fragment);

      if (state.visibleCount < state.stories.length) {
        const loadMore = document.createElement('button');
        loadMore.className = 'load-more';
        loadMore.type = 'button';
        loadMore.textContent = `Show more (${state.stories.length - state.visibleCount} remaining)`;
        loadMore.addEventListener('click', () => {
          state.visibleCount += PAGE_SIZE;
          renderStories();
          loadMore.focus();
        });
        elements.list.append(loadMore);
      }
    }

    function getFilters() {
      return {
        timeframe: Number(elements.timeframe.value),
        minComments: Math.max(0, Number(elements.minComments.value)),
        sort: elements.sort.value
      };
    }

    function applySavedFilters() {
      let saved = {};
      try {
        saved = JSON.parse(localStorage.getItem(FILTER_KEY) || '{}');
      } catch {
        saved = {};
      }
      const params = new URLSearchParams(location.search);
      const values = {
        timeframe: params.get('timeframe') || saved.timeframe || '604800',
        minComments: params.get('minComments') ?? saved.minComments ?? '100',
        sort: params.get('sort') || saved.sort || 'comments'
      };
      if ([...elements.timeframe.options].some(option => option.value === String(values.timeframe))) {
        elements.timeframe.value = String(values.timeframe);
      }
      if ([...elements.sort.options].some(option => option.value === values.sort)) {
        elements.sort.value = values.sort;
      }
      const minimum = Number(values.minComments);
      elements.minComments.value = Number.isFinite(minimum) ? Math.min(10000, Math.max(0, minimum)) : 100;
    }

    function saveFilters(filters) {
      localStorage.setItem(FILTER_KEY, JSON.stringify(filters));
      const params = new URLSearchParams();
      params.set('timeframe', filters.timeframe);
      params.set('minComments', filters.minComments);
      params.set('sort', filters.sort);
      history.replaceState(null, '', `${location.pathname}?${params}`);
    }

    function sortStories(stories, sortBy) {
      const comparisons = {
        comments: (a, b) => Number(b.num_comments || 0) - Number(a.num_comments || 0),
        points: (a, b) => Number(b.points || 0) - Number(a.points || 0),
        recent: (a, b) => Number(b.created_at_i || 0) - Number(a.created_at_i || 0)
      };
      return stories.sort(comparisons[sortBy] || comparisons.comments);
    }

    async function fetchApiPage(baseUrl, page) {
      const response = await fetch(`${baseUrl}&page=${page}`);
      if (!response.ok) throw new Error(`The news service returned HTTP ${response.status}.`);
      return response.json();
    }

    async function fetchStories() {
      if (state.isLoading || !elements.form.reportValidity()) return;
      const filters = getFilters();
      saveFilters(filters);

      const timestamp = Math.floor(Date.now() / 1000) - filters.timeframe;
      const numericFilters = encodeURIComponent(`created_at_i>${timestamp},num_comments>=${filters.minComments}`);
      const baseUrl = `https://hn.algolia.com/api/v1/search_by_date?tags=story&numericFilters=${numericFilters}&hitsPerPage=100`;

      state.isLoading = true;
      state.visibleCount = PAGE_SIZE;
      elements.apply.disabled = true;
      elements.list.setAttribute('aria-busy', 'true');
      setStatus('Finding conversations…', true);
      renderSkeletons();

      try {
        const firstPage = await fetchApiPage(baseUrl, 0);
        const pageCount = Math.min(Number(firstPage.nbPages || 1), MAX_API_PAGES);
        const remaining = await Promise.all(
          Array.from({ length: Math.max(0, pageCount - 1) }, (_, index) => fetchApiPage(baseUrl, index + 1))
        );
        const hits = [firstPage, ...remaining].flatMap(page => Array.isArray(page.hits) ? page.hits : []);
        const uniqueHits = [...new Map(hits.map(hit => [String(hit.objectID), hit])).values()];
        state.stories = sortStories(uniqueHits, filters.sort).map((story, index) => ({ ...story, rank: index + 1 }));
        state.isTruncated = Number(firstPage.nbPages || 0) > MAX_API_PAGES;

        const timeframeLabel = elements.timeframe.selectedOptions[0].textContent.toLowerCase();
        const truncation = state.isTruncated ? ' · first 1,000 matches' : '';
        setStatus(
          `${state.stories.length.toLocaleString()} ${state.stories.length === 1 ? 'story' : 'stories'} · ${timeframeLabel} · ${filters.minComments}+ comments${truncation}`
        );
        renderStories();
      } catch (error) {
        setStatus('Stories could not be loaded.');
        elements.list.replaceChildren();
        const section = document.createElement('section');
        section.className = 'error-state';
        const heading = document.createElement('h2');
        heading.textContent = 'Something went wrong';
        const detail = document.createElement('p');
        detail.textContent = error instanceof Error ? error.message : 'Please try again.';
        const retry = document.createElement('button');
        retry.className = 'retry-button';
        retry.type = 'button';
        retry.textContent = 'Try again';
        retry.addEventListener('click', fetchStories);
        section.append(heading, detail, retry);
        elements.list.append(section);
      } finally {
        state.isLoading = false;
        elements.apply.disabled = false;
        elements.list.setAttribute('aria-busy', 'false');
      }
    }

    function setTheme(theme) {
      document.documentElement.dataset.theme = theme;
      localStorage.setItem(THEME_KEY, theme);
      const useLight = theme === 'dark';
      elements.theme.textContent = useLight ? '☀' : '☾';
      elements.theme.setAttribute('aria-label', `Use ${useLight ? 'light' : 'dark'} theme`);
    }

    function initializeTheme() {
      const stored = localStorage.getItem(THEME_KEY);
      const preferred = matchMedia('(prefers-color-scheme: light)').matches ? 'light' : 'dark';
      setTheme(stored === 'light' || stored === 'dark' ? stored : preferred);
    }

    elements.form.addEventListener('submit', event => {
      event.preventDefault();
      fetchStories();
    });
    elements.list.addEventListener('click', event => {
      const link = event.target.closest('[data-read-target]');
      if (link) setRead(link.dataset.readTarget, true);
    });
    elements.theme.addEventListener('click', () => {
      setTheme(document.documentElement.dataset.theme === 'dark' ? 'light' : 'dark');
    });

    applySavedFilters();
    initializeTheme();
    fetchStories();
  </script>
</body>
</html>
